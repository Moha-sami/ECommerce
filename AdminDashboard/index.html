<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard - Add Product</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; background: #0f172a; color: #f8fafc; }
    h2 { border-bottom: 1px solid #334155; padding-bottom: 0.5rem; }
    .card { background: #1e293b; padding: 1.5rem; border-radius: 8px; margin-bottom: 1.5rem; border: 1px solid #334155; }
    label { display: block; margin-top: 0.75rem; font-weight: 500; font-size: 0.9rem; color: #94a3b8; }
    input, select, textarea { width: 100%; padding: 0.5rem; margin-top: 0.25rem; border-radius: 4px; border: 1px solid #475569; background: #0f172a; color: #fff; box-sizing: border-box; }
    button { margin-top: 1rem; padding: 0.6rem 1.2rem; background: #2563eb; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
    button:hover { background: #1d4ed8; }
    .msg { margin-top: 1rem; padding: 0.75rem; border-radius: 4px; white-space: pre-wrap; word-break: break-word; }
    .success { background: #065f46; color: #a7f3d0; }
    .error { background: #991b1b; color: #fecaca; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h2>ECommerce Admin Dashboard</h2>

  <!-- Section A: Login -->
  <div id="loginSection" class="card">
    <h3>Admin Login</h3>
    <form id="loginForm">
      <label>Email</label>
      <input type="email" id="loginEmail" value="alice@example.com" required>
      <label>Password</label>
      <input type="password" id="loginPassword" value="Password123!" required>
      <button type="submit">Login</button>
    </form>
    <div id="loginMsg" class="msg hidden"></div>
  </div>

  <!-- Section B: Add Product -->
  <div id="productSection" class="card hidden">
    <p>Logged in as: <strong id="adminEmail" style="color:#38bdf8"></strong></p>
    <h3>Add New Product</h3>
    <form id="productForm">
      <label>Product Name</label>
      <input type="text" id="pName" placeholder="e.g. Blue Running Shoes" required>

      <label>Description</label>
      <textarea id="pDesc" rows="3" placeholder="Product description..." required></textarea>

      <label>Price ($)</label>
      <input type="number" step="0.01" id="pPrice" placeholder="99.99" required>

      <label>Picture URL</label>
      <input type="text" id="pPic" value="images/products/placeholder.jpeg" required>

      <label>Brand</label>
      <select id="pBrand" required><option value="">Loading brands...</option></select>

      <label>Type</label>
      <select id="pType" required><option value="">Loading types...</option></select>

      <button type="submit">Add Product</button>
    </form>
    <div id="productMsg" class="msg hidden"></div>
  </div>

  <script>
    const API_BASE_URL = 'http://localhost:5238';
    let token = null;

    const loginSection = document.getElementById('loginSection');
    const productSection = document.getElementById('productSection');
    const loginMsg = document.getElementById('loginMsg');
    const productMsg = document.getElementById('productMsg');

    function showMsg(el, text, isError) {
      el.textContent = text;
      el.className = `msg ${isError ? 'error' : 'success'}`;
    }

    // Handle Login
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      loginMsg.className = 'msg hidden';
      try {
        const res = await fetch(`${API_BASE_URL}/api/account/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || data.error || 'Login failed');

        token = data.token;
        document.getElementById('adminEmail').textContent = data.email;
        loginSection.classList.add('hidden');
        productSection.classList.remove('hidden');
        loadDropdowns();
      } catch (err) {
        showMsg(loginMsg, err.message, true);
      }
    });

    // Populate Dropdowns
    async function loadDropdowns() {
      try {
        const [brandsRes, typesRes] = await Promise.all([
          fetch(`${API_BASE_URL}/api/products/Brand`),
          fetch(`${API_BASE_URL}/api/products/types`)
        ]);
        const brands = await brandsRes.json();
        const types = await typesRes.json();

        document.getElementById('pBrand').innerHTML = brands.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
        document.getElementById('pType').innerHTML = types.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
      } catch (err) {
        showMsg(productMsg, `Failed to load brands/types: ${err.message}`, true);
      }
    }

    // Handle Add Product
    document.getElementById('productForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      productMsg.className = 'msg hidden';
      try {
        const payload = {
          name: document.getElementById('pName').value,
          description: document.getElementById('pDesc').value,
          price: parseFloat(document.getElementById('pPrice').value),
          pictureUrl: document.getElementById('pPic').value,
          productBrandId: parseInt(document.getElementById('pBrand').value),
          productTypeId: parseInt(document.getElementById('pType').value)
        };

        const res = await fetch(`${API_BASE_URL}/api/products`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.message || JSON.stringify(data));

        showMsg(productMsg, `Product Added Successfully! ID: ${data.id}\n${JSON.stringify(data, null, 2)}`, false);
        document.getElementById('productForm').reset();
      } catch (err) {
        showMsg(productMsg, `Error: ${err.message}`, true);
      }
    });
  </script>
</body>
</html>
